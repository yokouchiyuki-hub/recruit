<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Footer — Component Library</title>
<link rel="stylesheet" href="../tokens.css">
<style>
.site-footer{background:var(--ink);padding:56px 64px 36px}
.footer-in{max-width:1160px;margin:0 auto}
.footer-top{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:48px;padding-bottom:40px;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:28px}
.footer-logo{font-family:var(--font-en);font-size:16px;font-weight:700;color:rgba(255,255,255,.65);margin-bottom:16px;display:block}
.footer-desc{font-size:14px;color:rgba(255,255,255,.32);line-height:2;font-weight:300}
.footer-nav-title{font-family:var(--font-en);font-size:14px;letter-spacing:.2em;color:rgba(255,255,255,.28);text-transform:uppercase;margin-bottom:14px}
.footer-nav-list{list-style:none;display:flex;flex-direction:column;gap:10px}
.footer-nav-list a{font-size:14px;color:rgba(255,255,255,.45);transition:color .2s,padding-left .2s}
.footer-nav-list a:hover{color:rgba(255,255,255,.85);padding-left:4px}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.footer-copy{font-family:var(--font-en);font-size:14px;color:rgba(255,255,255,.18);letter-spacing:.08em}
.footer-sub{display:flex;gap:20px}
.footer-sub a{font-size:14px;color:rgba(255,255,255,.22);transition:color .2s}
.footer-sub a:hover{color:rgba(255,255,255,.6)}

@media(max-width:768px){.footer-top{grid-template-columns:1fr;gap:28px}}
</style>
</head>
<body>

<h2 style="padding:20px 48px 10px;font-family:var(--font-en);font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--sky-400)">14 — Footer</h2>

<footer class="site-footer">
  <div class="footer-in">
    <div class="footer-top">
      <div>
        <span class="footer-logo">PRINCIPAL HOME</span>
        <p class="footer-desc">新卒採用 2027<br>あなたの夢を、形に。<br>町田市・横浜市の注文住宅メーカー</p>
      </div>
      <div>
        <div class="footer-nav-title">Menu</div>
        <ul class="footer-nav-list">
          <li><a href="#">会社を知る</a></li>
          <li><a href="#">仕事を知る</a></li>
          <li><a href="#">人を知る</a></li>
          <li><a href="#">環境・制度</a></li>
          <li><a href="#">よくある質問</a></li>
        </ul>
      </div>
      <div>
        <div class="footer-nav-title">Recruit</div>
        <ul class="footer-nav-list">
          <li><a href="#">募集要項</a></li>
          <li><a href="#">選考フロー</a></li>
          <li><a href="#">お知らせ</a></li>
          <li><a href="#">エントリー</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom">
      <span class="footer-copy">© 2026 Principal Home Inc. All Rights Reserved.</span>
      <div class="footer-sub">
        <a href="#">プライバシーポリシー</a>
        <a href="#">サイトマップ</a>
      </div>
    </div>
  </div>
</footer>

</body>
</html>
